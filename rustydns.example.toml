# rustydns example configuration
# ─────────────────────────────────────────────────────────────────────────────
# Copy to /etc/rustydns/rustydns.toml and edit before starting the daemon.
# Set strict permissions after copying:
#
#   chown rustydns:rustydns /etc/rustydns/rustydns.toml
#   chmod 640 /etc/rustydns/rustydns.toml
#
# The daemon will refuse to start if the config file is world-readable.
#
# All settings shown are the defaults unless marked otherwise.
# Options marked ⚠ have significant security or privacy implications.
# ─────────────────────────────────────────────────────────────────────────────

# ---------------------------------------------------------------------------
[server]
# ---------------------------------------------------------------------------

# UDP and TCP listen addresses.
#
# ⚠ SECURITY: "127.0.0.1:53" serves only the local host.
#   Change to a specific interface IP (e.g. "192.168.1.1:53") to serve
#   your LAN, or "0.0.0.0:53" to serve ALL interfaces.
#   Never expose port 53 to the public internet — use a firewall rule if
#   binding to 0.0.0.0. Binding to 0.0.0.0 also exposes the resolver to
#   untrusted devices on any attached network (VPN, container bridge, etc.).
listen = ["127.0.0.1:53"]

# Rustynet mesh zone name (must end with a dot).
mesh_zone = "mesh."

# DNS-over-HTTPS listener.
# ⚠ SECURITY: Do not expose this to the public internet without a reverse
#   proxy (nginx/Caddy) that enforces rate limiting and access control.
#   A public DoH endpoint can be abused as a DNS amplification vector.
doh_listen = "127.0.0.1:8053"

# DNS-over-TLS listener (comment out to disable).
# ⚠ SECURITY: Requires tls_cert_path and tls_key_path to be set below.
#   The daemon will refuse to start if dot_listen is set without both paths.
#   The certificate must be readable by the rustydns user; the private key
#   should be chmod 600 and owned by rustydns:rustydns.
# dot_listen = "0.0.0.0:853"

# Paths to the TLS certificate and private key for the DoT listener.
# Required when dot_listen is set; ignored otherwise.
# tls_cert_path = "/etc/rustydns/tls.crt"
# tls_key_path  = "/etc/rustydns/tls.key"

# ---------------------------------------------------------------------------
[upstream]
# ---------------------------------------------------------------------------

# Upstream DoH resolver URLs. All must use https://.
# ⚠ PRIVACY: With randomize_upstream_selection = true (the default), queries
#   are distributed across these resolvers so no single resolver builds a
#   complete query history. Use resolvers from different operators and
#   jurisdictions for strongest protection.
resolvers = [
    "https://dns.quad9.net/dns-query",           # Quad9 (privacy-focused, DNSSEC)
    "https://cloudflare-dns.com/dns-query",       # Cloudflare 1.1.1.1
]

# Upstream protocol: "doh" (default), "doq", "odoh", or "plain".
# ⚠ SECURITY: "plain" sends DNS over unencrypted UDP/TCP. This leaks every
#   resolved domain name to network observers (ISPs, on-path attackers).
#   Using "plain" emits a startup warning and will become a hard error in a
#   future release.
# ⚠ The `protocol` value MUST match the scheme of every URL in `resolvers`:
#   - "doh"   → all resolvers must start with `https://`
#   - "doq"   → all resolvers must start with `quic://`  (e.g. "quic://dns.adguard-dns.com:853")
#   - "odoh"  → all resolvers (the ODoH *targets*) must start with `https://`
#   - "plain" → all resolvers must be bare `host:port` (no scheme), e.g. "1.1.1.1:53"
#   The daemon refuses to start on a mismatch — caught at validate_config.
#
# "odoh" (Oblivious DoH, RFC 9230) is the strongest anonymity option: the query
# is HPKE-encrypted to the target resolver and relayed through an oblivious
# proxy (odoh_proxies below), so the target never learns your client IP and the
# proxy never learns your query. Requirements when protocol = "odoh":
#   - set odoh_proxies to one or more https:// proxies operated INDEPENDENTLY of
#     the target (if one party runs both, it can correlate IP with query). List
#     several independent relays and the resolver picks one at random per query,
#     so no single relay sees all your traffic.
#   - set dnssec_validation = false — the oblivious arm does NOT do client-side
#     DNSSEC validation (you rely on a validating target instead). Use "doh"/"doq"
#     if you want client-side DNSSEC.
# On any failure the ODoH arm returns SERVFAIL; it never falls back to plain DoH.
protocol = "doh"

# Oblivious relay URLs for ODoH. Required (non-empty) when protocol = "odoh";
# must be empty otherwise (rejected if set without protocol = "odoh"). Each must
# be operationally independent from the target resolver.
# odoh_proxies = [
#   "https://odoh-relay-a.example/proxy",
#   "https://odoh-relay-b.example/proxy",
# ]

# Return SERVFAIL when all upstreams fail.
# ⚠ SECURITY: Do not set to false. Disabling fail-closed allows the resolver
#   to silently fall back to less secure behaviour on upstream failure.
fail_closed = true

# Minimum TLS version for upstream connections.
# "1.3" (default) — provides mandatory forward secrecy and authenticated
#   encryption. Strongly recommended.
# "1.2" — accepted with a startup warning. Weaker cipher suites are possible.
min_tls_version = "1.3"

# Validate DNSSEC signatures on upstream responses.
# ⚠ SECURITY: Disabling allows spoofed/forged upstream answers to be served
#   to clients. Do not disable unless you are certain no upstream zone is
#   DNSSEC-signed.
dnssec_validation = true

# Per-upstream query timeout (milliseconds).
timeout_ms = 5000

# Maximum cached upstream responses (LRU eviction when full).
# Must be ≤ 500,000 (hard limit enforced at startup).
# Note: when conditional-forwarding routes are configured (below), this
# cache size applies per-arm (default + one per route). Tune down if you
# add several routes on memory-constrained hosts.
max_cache_entries = 10000

# DNS-rebinding defence (default false).
# ⚠ SECURITY: When true, A/AAAA records returned by the DEFAULT upstream
#   that point at private/loopback/link-local/etc. addresses are stripped
#   from the response. Blocks "attacker pivots browser to LAN" rebinding
#   attacks where short-TTL public DNS flips to 127.0.0.1 or 192.168.x.x.
#   Each dropped record is counted in
#   rustydns_resolver_private_rdata_dropped_total.
# ⚠ Default OFF because internal-DNS deployments routinely resolve
#   names to RFC 1918 addresses on purpose. Turn on only if this host
#   resolves public Internet names only — OR pair with static records
#   / [[upstream.routes]] so internal zones bypass the filter.
# ⚠ Conditional-forwarding route responses are NEVER filtered, regardless
#   of this setting — operators route to internal resolvers precisely so
#   they CAN return private addresses.
block_private_rdata = false

# Conditional-forwarding routes (optional).
# ⚠ Each route gets its own independent resolver instance. The
#   privacy/security knobs above (fail_closed, min_tls_version,
#   dnssec_validation, timeout_ms, max_cache_entries) AND the privacy
#   section's settings (no_edns_client_subnet, randomize_upstream_selection,
#   etc.) are inherited from the global config — there are no per-route
#   overrides for any privacy or security knob, by design.
#
# Matching: a query whose qname equals the `zone` OR ends in `.<zone>`
# is forwarded to that route's resolvers. Longest matching zone wins
# (e.g. a `corp.internal.` route beats an `internal.` route for
# `server.corp.internal.`). Authority and blocklist still run BEFORE
# route selection — the pipeline order is unchanged.
#
# Plaintext routes (protocol = "plain") emit an UNENCRYPTED-leaks
# warning at startup, the same one the global plain protocol does.
#
# Example: route LAN names to the router's DNS (plaintext, RFC 1918).
# [[upstream.routes]]
# zone      = "lan."
# resolvers = ["192.168.1.1:53"]
# protocol  = "plain"
#
# Example: route corporate names to an internal DoH endpoint.
# [[upstream.routes]]
# zone      = "corp.internal."
# resolvers = ["https://internal-dns.example.com/dns-query"]
# protocol  = "doh"
#
# Example: route RFC 1918 reverse DNS to the LAN router.
# [[upstream.routes]]
# zone      = "168.192.in-addr.arpa."
# resolvers = ["192.168.1.1:53"]
# protocol  = "plain"

# ---------------------------------------------------------------------------
[authority]
# ---------------------------------------------------------------------------

# Path to the signed dns-zone bundle file written by rustynetd.
# If unset, the authority runs in static-only mode (no mesh zone).
mesh_zone_bundle_path = "/var/lib/rustynet/dns-zone.bundle"

# Path to the ed25519 verifier public key (hex-encoded, 64 chars on a
# single line). Required when mesh_zone_bundle_path is set. The
# corresponding signing key lives inside rustynetd and never leaves it.
mesh_zone_verifier_key_path = "/var/lib/rustynet/dns-zone-verifier.key"

# Maximum age (seconds) of a bundle that is still considered fresh. A
# bundle whose generated_at_unix is older than now - max_age, OR whose
# expires_at_unix is in the past, is rejected at load time and the
# previous snapshot keeps serving. Default 600s (10 min).
mesh_zone_max_age_secs = 600

# Rustynet mesh zone name. Must end with '.'. Mirror of server.mesh_zone —
# keep these two in sync (the daemon does not auto-sync them so you can
# split-horizon if you need to).
mesh_zone = "mesh."

# How often to re-read the bundle file in seconds (set to 0 to disable
# polling — operators can still SIGHUP to reload on demand).
poll_interval_secs = 30

# Static zone records.
# [[authority.static_records]]
# name    = "myserver.mesh."
# type    = "A"
# address = "100.64.0.10"
# ttl     = 300

# ---------------------------------------------------------------------------
[blocklist]
# ---------------------------------------------------------------------------

# Remote blocklist sources. All URLs must use https://.
# ⚠ SECURITY: Any remote source is a potential supply-chain attack vector.
#   Use multiple independent sources from different organisations so that
#   a single compromised source cannot remove all blocks. See also
#   trusted_rpz_sources below.
sources = [
    "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts",
    # "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/domains/pro.txt",
]

# Local blocklist files (paths on the daemon host; loaded as trusted sources).
# Supported formats: plain domain list, hosts file, RPZ zone, AdGuard filter.
# local_files = ["/etc/rustydns/custom-blocklist.txt"]

# Trusted RPZ sources.
# ⚠ SECURITY: Only blocklist URLs listed here can inject allowlist (passthru)
#   entries into the resolver. All other remote sources are treated as
#   untrusted — allowlist entries from untrusted sources are silently discarded
#   with a warning metric (RPZ passthru injection protection).
#   Only add URLs that you control end-to-end (origin server + CDN + DNS).
trusted_rpz_sources = [
    # "https://my-internal-server.example.com/allowlist.rpz",
]

# Maximum size of a single blocklist fetch (bytes).
# Fetches that exceed this limit are aborted and the source is skipped.
# Must be > 0 and ≤ 104,857,600 (100 MiB).
max_fetch_bytes = 52428800   # 50 MiB

# Maximum time allowed for a single blocklist fetch (milliseconds).
# A source that does not complete within this window is skipped for this
# reload cycle. Prevents slow/malicious sources from holding worker threads.
fetch_timeout_ms = 30000     # 30 seconds

# How to respond to blocked queries:
# "nxdomain" (default) — does not reveal that blocking is active
# "sinkhole"           — return sinkhole_ip (useful for block-page redirects)
# "refused"            — return REFUSED
block_response = "nxdomain"

# IP address returned when block_response = "sinkhole".
sinkhole_ip = "0.0.0.0"

# Reload interval for remote sources (seconds).
# Must be ≥ 300 (5 minutes) or 0 (reload on SIGHUP only).
# Values between 1 and 299 are rejected at startup.
reload_interval_secs = 86400   # 24 hours

# Allowlist — never blocked, even if present in a blocklist source.
# Supports exact matches ("safe.ads.example.com") and wildcards ("*.example.com").
# ⚠ SECURITY: Single-label wildcards (e.g. "*.com") are rejected at startup —
#   they would exempt an entire TLD from blocking.
allowlist = [
    # "fonts.googleapis.com",
    # "*.cdn.example.com",
]

# CNAME-cloaking defence (default: true). Trackers evade QNAME blocklists by
# pointing a clean first-party name (metrics.example.com) at a CNAME like
# c.tracker-adnetwork.net. After the upstream answers, rustydns walks the
# answer's CNAME chain and blocks the whole response (per block_response) if
# any target is on the blocklist. Set to false only if a legitimate CNAME of
# yours targets a domain on an aggressive blocklist (prefer allowlisting that
# target instead).
block_cname_cloaking = true

# Response-IP denylist (default: empty). After the upstream answers, block any
# query whose resolved A/AAAA falls inside one of these IP/CIDR ranges — useful
# for malware C2 / ad-network ranges that rotate domains faster than a name
# blocklist can track. Complements upstream.block_private_rdata (which strips
# PRIVATE rdata) by letting you name ARBITRARY bad ranges. Entries are single
# hosts or CIDRs, IPv4 or IPv6; malformed entries are rejected at startup.
response_ip_denylist = [
    # "198.51.100.0/24",
    # "2001:db8:bad::/48",
    # "203.0.113.5",
]

# Regex block rules (power users; default: empty). A query whose QNAME matches
# any pattern is blocked (per block_response), alongside the exact/wildcard
# lists — the allowlist still wins. Matching uses a linear-time finite-automata
# engine (no catastrophic backtracking / ReDoS). Patterns are ASCII, matched
# case-insensitively against the lowercased QNAME (no trailing dot). Each
# pattern ≤ 512 bytes; ≤ 1000 patterns. Invalid patterns are rejected at start.
regex_rules = [
    # "^ads?[0-9]*\\.",            # ad / ads / ads3 . ...
    # "(^|\\.)doubleclick\\.net$",
    # "(^|\\.)googlesyndication\\.com$",
]

# Per-client blocklist groups (default: none). Each [[blocklist.groups]] is an
# independent block set (its own sources/local_files/allowlist) that REPLACES
# the global blocklist for clients assigned to it via [[policy]].blocklist_group
# ("guest gets the strict list", "iot can only reach vendor domains"). The
# global response settings (block_response / regex_rules / response_ip_denylist
# / block_cname_cloaking) still apply. Group definitions are restart-only
# (SIGHUP re-fetches a group's content but can't add/remove groups).
# [[blocklist.groups]]
# name      = "strict"
# sources   = ["https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/social/hosts"]
# allowlist = ["fonts.gstatic.com"]
#
# [[blocklist.groups]]
# name    = "iot"
# local_files = ["/etc/rustydns/iot-allowlist.hosts"]

# ---------------------------------------------------------------------------
[privacy]
# ---------------------------------------------------------------------------
# All options default to maximum privacy. Reducing privacy requires an
# explicit change. Each reduction is noted with its privacy implication.

# RFC 7816: send only the minimum necessary labels to each upstream nameserver.
# Disabling means the full query name is sent to every upstream at every step.
# ⚠ NOT YET ACTIVE: hickory 0.26's stub resolver does not expose qmin. The
#   daemon emits a tracing::warn! at startup if this is true; the setting will
#   be honoured the moment hickory ships support.
query_minimization = true

# RFC 7871: strip EDNS0 Client Subnet from all outgoing queries.
# Disabling leaks your client's approximate IP subnet to upstream resolvers.
no_edns_client_subnet = true

# RFC 8467: pad DoH queries to fixed block sizes (128-byte blocks).
# Disabling allows packet-size analysis to infer query name lengths.
# ⚠ NOT YET ACTIVE: hickory 0.26 does not expose RFC 8467 padding. The daemon
#   emits a tracing::warn! at startup if this is true; encrypted query sizes
#   still leak the queried domain until hickory ships support.
upstream_padding = true

# Select an upstream resolver uniformly at random per query.
# Disabling always uses the first configured resolver, giving it a complete
# query history.
randomize_upstream_selection = true

# Write query logs to disk (false = in-memory ring buffer only).
# ⚠ PRIVACY: Disk logs are persistent. What lands on disk is still privacy-safe
#   by construction — the QNAME is always salted-hashed (never plaintext) and the
#   client IP is always anonymised (IPv4 /16, IPv6 /64), regardless of
#   log_client_ips. The daemon emits a startup warning when this is true.
#   The file is created mode 0600; the daemon refuses to write to an existing
#   target that is group/world readable (and keeps serving DNS).
#   Format is line-delimited JSON (NDJSON), one object per query, with built-in
#   size-based rotation — no external logrotate needed.
query_log_to_disk = false

# Path for the on-disk query log. REQUIRED when query_log_to_disk = true,
# ignored otherwise. Rotated files get a .1, .2, … suffix.
# query_log_disk_path = "/var/log/rustydns/queries.ndjson"

# Rotate the active query-log file once it reaches this many bytes.
# Default 10 MiB. Range: 4096 .. 1 GiB. Tuned for low-power devices.
query_log_max_file_bytes = 10485760

# How many query-log files to retain (active + rotated). Oldest is deleted on
# rotation. Default 5. Must be ≥ 1. Total disk footprint ≈ max_file_bytes ×
# max_files.
query_log_max_files = 5

# Size of the in-memory query log ring buffer.
# Must be ≤ 100,000 (hard limit enforced at startup).
query_log_ring_size = 10000

# Log full client IP addresses.
# ⚠ PRIVACY: false (default) — log anonymised IPs only:
#   IPv4: last TWO octets zeroed (192.168.0.0/16). Last-octet-only zeroing (/24)
#         is insufficient for home networks and is not configurable.
#   IPv6: last 64 bits zeroed (/64).
#   Node IDs are always omitted from logs regardless of this setting.
# true — log full IPs. Use only for targeted debugging; disable when done.
log_client_ips = false

# ---------------------------------------------------------------------------
[rate_limit]
# ---------------------------------------------------------------------------
# Per-source-IP token-bucket rate limiter. Token bucket: each non-loopback
# client gets `burst` tokens to start; tokens refill at `qps`/sec; a query
# that finds the bucket empty is refused with REFUSED (NOT silently dropped,
# so operators can see throttling in logs and metrics).
#
# ⚠ Loopback (127.0.0.0/8, ::1) is ALWAYS exempt. Local proxies and
#   DoH/DoT terminators aggregating many users behind one connection
#   would hit the per-IP limit instantly otherwise.

# Apply the limiter. Default: true.
# Disable only if a single trusted proxy fronts the daemon and you handle
# rate limiting upstream.
enabled = true

# Sustained queries-per-second permitted per source IP. Must be > 0.
# Default 100 — well above any normal device's sustained DNS load.
qps = 100

# Burst capacity — the maximum queries one IP can fire back-to-back
# before the per-second rate kicks in. Must be ≥ qps. Default 200
# (two seconds of sustained-rate budget).
burst = 200

# Maximum distinct source IPs tracked at once. Bounds memory under a
# forge-IP flood; when full the least-recently-used bucket is evicted.
# Idle buckets are also reaped every 30s after 5 min idle. Capped at
# 1,000,000 by validate_config. Default 10,000 (~640 KiB at 64 B/bucket).
max_tracked_clients = 10000

# ---------------------------------------------------------------------------
[metrics]
# ---------------------------------------------------------------------------

# Prometheus metrics endpoint.
# ⚠ SECURITY: Must be bound to loopback only. Metrics are unauthenticated.
#   Binding to 0.0.0.0 exposes query rate, blocklist hit counts, and upstream
#   latency to anyone on the network. The daemon emits a startup warning if
#   this is not a loopback address.
listen = "127.0.0.1:9153"
path   = "/metrics"

# ---------------------------------------------------------------------------
# Per-node policy (optional — Rusty Suite mesh integration)
# Use [[policy]] (TOML array of tables) for each node entry.
# ---------------------------------------------------------------------------

# A policy matches by EITHER `node_id` (Rustynet NodeId, schema accepted
# but matching is pending peer-table integration) OR `client_ip` (works
# today). At least one must be set.

# Example: a known server allowed to resolve ad-network names for testing.
# [[policy]]
# client_ip        = "10.0.0.5"
# blocklist_bypass = true

# Example: a guest device quarantined to mesh-internal names only. Any
# query outside `zones_allowed` returns REFUSED before the pipeline runs.
# [[policy]]
# client_ip     = "10.0.0.99"
# zones_allowed = ["mesh."]

# Example: assign a client to a named blocklist group (see [[blocklist.groups]]
# above). This client is matched against the "strict" group's list instead of
# the global blocklist.
# [[policy]]
# client_ip       = "10.0.0.60"
# blocklist_group = "strict"

# Example: NodeId-keyed policy. Parsed but not yet matched at runtime —
# `client_ip` is required for actual enforcement today.
# [[policy]]
# node_id          = "ed25519:AbCdEf..."
# blocklist_bypass = false

# Example: scheduled block windows. While a window is active, EVERY query from
# this client is refused (REFUSED) before the pipeline runs — "kids' devices
# off after 22:00", "guest network blocked overnight". Set both `start` and
# `end` (HH:MM, 24h) for a timed window, or neither for an all-day window.
# `end <= start` wraps past midnight. `days` lists weekdays (mon..sun); empty =
# every day. `utc_offset_minutes` interprets the times locally (DST not applied
# — set the offset for the period that matters).
# [[policy]]
# client_ip = "10.0.0.50"
#   [[policy.block_windows]]
#   start = "22:00"
#   end   = "07:00"
#   utc_offset_minutes = -300       # UTC-5
#   [[policy.block_windows]]
#   days = ["sat", "sun"]           # all day on weekends

# ---------------------------------------------------------------------------
# DNS rewrites / local cloaking map
# ---------------------------------------------------------------------------
# Override names OUTSIDE your authoritative zones: pin an internal service to
# a LAN IP, redirect a CDN, or blackhole a domain without a blocklist.
# Consulted AFTER the authority (authority wins) and BEFORE the blocklist and
# resolver. Each [[rewrite]] sets exactly one of: address, target, block.
# Hot-reloadable on SIGHUP. Use [[rewrite]] (TOML array of tables).

# Pin a name to an IP (synthesises A/AAAA; the wrong family returns NODATA so
# the pinned name never leaks upstream):
# [[rewrite]]
# name    = "grafana.corp.example.com"
# address = "10.0.0.20"

# Redirect to another name via CNAME (the client then resolves the target):
# [[rewrite]]
# name   = "cdn.example.com"
# target = "internal-cdn.lan."

# Blackhole a domain (NXDOMAIN), no blocklist entry needed:
# [[rewrite]]
# name  = "telemetry.vendor.example"
# block = true

# Wildcard: all subdomains (NOT the apex). TLD-level wildcards (e.g. "*.com")
# are rejected at startup.
# [[rewrite]]
# name  = "*.ads.example.com"
# block = true

# ---------------------------------------------------------------------------
[safesearch]
# ---------------------------------------------------------------------------
# Enforce SafeSearch / Restricted Mode on the major search engines by
# injecting built-in CNAME rewrites (e.g. google.com → forcesafesearch.
# google.com). Merged with [[rewrite]] above — an explicit [[rewrite]] for
# the same name wins. Disabled by default. Hot-reloadable on SIGHUP.
enabled    = false
# Per-engine toggles (only apply when enabled = true; all default true):
google     = true     # → forcesafesearch.google.com
bing       = true     # → strict.bing.com
duckduckgo = true     # → safe.duckduckgo.com
youtube    = true     # → restrictmoderate.youtube.com (Restricted Mode)
