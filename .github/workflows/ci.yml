name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # We treat *compiler* warnings as errors (unused imports, dead code,
  # missing docs, etc.). Clippy *style* lints stay as warnings — they
  # surface in the log without breaking the build.
  RUSTFLAGS: -Dwarnings
  # Opt JavaScript-based actions (checkout, cache, docker/*) onto
  # Node.js 24 ahead of the June 2026 default switch. The pinned
  # action versions are unchanged; this just runs them on the newer
  # Node runtime and silences the deprecation notice in every run.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    # This job IS the MSRV gate: it pins the toolchain to the documented
    # floor (1.88) and runs the FULL suite — fmt, clippy, tests, release
    # build, and cargo-deny — on it. Compiling AND testing on 1.88 catches
    # accidental newer-stdlib or newer-behaviour usage that would break the
    # declared minimum. The `stable` job below adds forward coverage on the
    # latest toolchain.
    name: Test + MSRV (Rust 1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Match workspace.package.rust-version from Cargo.toml.
          # hickory 0.26 requires rustc 1.88, so the floor is pinned
          # to 1.88 here and in the Dockerfile.
          toolchain: "1.88"
          components: rustfmt, clippy

      - name: Cache cargo registry, index, and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        # Gate the FULL `clippy::all` bucket as errors (TODO 6.1). The tree is
        # kept clean under `-D clippy::all`, so this prevents style/complexity
        # drift, not just correctness regressions. Because this job is pinned to
        # 1.88, the clippy version is also pinned — a toolchain bump can't
        # surprise CI with a brand-new lint. If a deliberate exception is
        # needed, prefer a scoped `#[allow(...)]` with a comment over relaxing
        # this gate.
        run: cargo clippy --workspace --all-targets --tests -- -D clippy::all

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Build release
        # Smoke-build the release profile so LTO / strip don't surprise us.
        run: cargo build --workspace --release

      - name: cargo-deny (advisories + bans + licenses + sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Pin to the version of cargo-deny that ships the `version = 2`
          # advisories/licenses schema we use in deny.toml.
          command: check
          arguments: --all-features

      - name: "Daemon smoke: --validate-config on the example config"
        run: |
          chmod 600 rustydns.example.toml
          # The example config references blocklist URLs we can't fetch
          # in CI and a mesh bundle path that doesn't exist; we just
          # want to confirm validate_config accepts the schema. Trim the
          # remote sources to keep the test offline.
          cp rustydns.example.toml /tmp/rustydns-ci.toml
          chmod 600 /tmp/rustydns-ci.toml
          ./target/release/rustydnsd --config /tmp/rustydns-ci.toml --validate-config

  stable:
    # Forward coverage (TODO 6.2): the `test` job guards the 1.88 floor; this
    # job builds and tests the workspace on the latest stable toolchain so a
    # behaviour change or new failure on newer compilers is caught before it
    # reaches users on a current toolchain. Kept lean (no deny/docker — those
    # run in `test`).
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry, index, and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-stable-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-stable-cargo-

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace --all-targets

  docker:
    name: Docker image smoke build
    runs-on: ubuntu-latest
    # Independent of the cargo cache in `test`; runs in parallel so a
    # broken Dockerfile is caught on PR without serialising behind the
    # cargo build.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: rustydnsd:ci
          # GHA cache backend keeps successive PR builds fast without
          # leaking the layer to a registry.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Smoke run: --version inside the image"
        # Confirms the binary actually executes under the non-root user
        # with the dropped capabilities. We override the entrypoint
        # because tini-then-rustydnsd would otherwise wait on a config
        # file we haven't mounted.
        run: |
          docker run --rm --entrypoint /usr/local/bin/rustydnsd \
            rustydnsd:ci --version
